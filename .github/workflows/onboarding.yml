name: onboarding

# Guards the clean-clone onboarding path — the one a forker actually walks but the maintainer
# never does (their project is already bound via .xenomoon.json). Runs on every push/PR.
on:
  push:
  pull_request:

jobs:
  onboarding:
    name: Install + wiring
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # Enforce the by-domain folder layout (no loose modules at the top of ui/server|client).
      - run: npm run check:structure
      # Export the repo as a forker receives it (git archive of tracked files), install the webapp
      # domain into a fixture project, and assert it binds + stays pure + doctor reports healthy.
      - run: npm run test:onboarding
